<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#061f4a">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }}</title>
    <link rel="icon" href="{{ '/assets/images/entovist-logo.png' | relative_url }}" type="image/png">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="https://entovist.com" aria-label="Visit the Entovist homepage">
          <img src="{{ '/assets/images/entovist-logo.png' | relative_url }}" alt="Entovist">
        </a>
        <a class="site-home-link" href="https://entovist.com">
          Visit entovist.com
          <span aria-hidden="true">↗</span>
        </a>
      </div>
    </header>

    <main class="site-content markdown-body">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span>© {{ site.time | date: '%Y' }} Mahdi Ghorban Pour - Digitexia</span>
        <a href="https://entovist.com">Entovist homepage</a>
      </div>
    </footer>
  </body>
</html>
